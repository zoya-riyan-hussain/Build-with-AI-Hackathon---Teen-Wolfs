openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Career Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile operations
  - name: careers
    description: Career recommendation operations
  - name: simulation
    description: Simulation/quiz operations
  - name: performance
    description: Performance tracking operations
  - name: feedback
    description: AI feedback operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: No profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveProfile
      tags: [profile]
      summary: Save user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /careers/recommendations:
    get:
      operationId: getCareerRecommendations
      tags: [careers]
      summary: Get career recommendations based on profile
      responses:
        "200":
          description: Career recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerRecommendation"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulation/task:
    get:
      operationId: getSimulationTask
      tags: [simulation]
      summary: Get a simulation task
      responses:
        "200":
          description: Simulation task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationTask"

  /simulation/submit:
    post:
      operationId: submitSimulation
      tags: [simulation]
      summary: Submit simulation answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationSubmission"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /performance:
    get:
      operationId: getPerformanceHistory
      tags: [performance]
      summary: Get performance history
      responses:
        "200":
          description: Performance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerformanceRecord"

  /feedback:
    get:
      operationId: getAiFeedback
      tags: [feedback]
      summary: Get AI feedback based on performance
      responses:
        "200":
          description: AI feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiFeedback"
        "404":
          description: No performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProfileInput:
      type: object
      properties:
        name:
          type: string
        skills:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        academicYear:
          type: string
          enum: [Freshman, Sophomore, Junior, Senior, Graduate, Other]
      required:
        - name
        - skills
        - interests
        - academicYear

    Profile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        skills:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        academicYear:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - skills
        - interests
        - academicYear
        - createdAt

    CareerRecommendation:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        score:
          type: number
        fitPercentage:
          type: number
        matchedSkills:
          type: array
          items:
            type: string
        requiredSkills:
          type: array
          items:
            type: string
        salaryRange:
          type: string
        growthRate:
          type: string
      required:
        - title
        - description
        - score
        - fitPercentage
        - matchedSkills
        - requiredSkills
        - salaryRange
        - growthRate

    SimulationTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [quiz, coding]
        title:
          type: string
        description:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        timeLimit:
          type: number
        difficulty:
          type: string
          enum: [Easy, Medium, Hard]
        topic:
          type: string
      required:
        - id
        - type
        - title
        - description
        - question
        - options
        - timeLimit
        - difficulty
        - topic

    SimulationSubmission:
      type: object
      properties:
        taskId:
          type: string
        answer:
          type: string
        timeTaken:
          type: number
      required:
        - taskId
        - answer
        - timeTaken

    SimulationResult:
      type: object
      properties:
        score:
          type: number
        maxScore:
          type: number
        percentage:
          type: number
        correct:
          type: boolean
        feedback:
          type: string
        timeTaken:
          type: number
        recordId:
          type: string
      required:
        - score
        - maxScore
        - percentage
        - correct
        - feedback
        - timeTaken
        - recordId

    PerformanceRecord:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        taskTitle:
          type: string
        score:
          type: number
        maxScore:
          type: number
        percentage:
          type: number
        timeTaken:
          type: number
        date:
          type: string
        topic:
          type: string
        difficulty:
          type: string
      required:
        - id
        - taskId
        - taskTitle
        - score
        - maxScore
        - percentage
        - timeTaken
        - date
        - topic
        - difficulty

    AiFeedback:
      type: object
      properties:
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        overallScore:
          type: number
        improvementTips:
          type: array
          items:
            type: string
        trend:
          type: object
          properties:
            direction:
              type: string
              enum: [up, down, flat]
            delta:
              type: number
            earlyAvg:
              type: number
            recentAvg:
              type: number
          required:
            - direction
            - delta
            - earlyAvg
            - recentAvg
      required:
        - strengths
        - weaknesses
        - suggestions
        - overallScore
        - improvementTips
        - trend

    DashboardSummary:
      type: object
      properties:
        hasProfile:
          type: boolean
        profileName:
          type: string
        totalSimulations:
          type: number
        averageScore:
          type: number
        bestScore:
          type: number
        topCareer:
          type: string
        topCareerFit:
          type: number
        recentActivity:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              score:
                type: number
              topic:
                type: string
            required:
              - date
              - score
              - topic
      required:
        - hasProfile
        - totalSimulations
        - averageScore
        - bestScore
        - recentActivity
